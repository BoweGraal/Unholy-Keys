<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Unholy Keys — Live</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a25;--bg4:#22222f;--tx:#e0e0e8;--tx2:#8888a0;--tx3:#555568;
  --pk:#D354A0;--pu:#7F77DD;--tl:#1D9E75;--co:#D85A30;--ro:#D4537E;--sk:#378ADD;--am:#EF9F27;--r:8px}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;overflow:hidden;-webkit-tap-highlight-color:transparent}

/* JOIN SCREEN */
#joinScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;gap:20px}
#joinScreen.hidden{display:none}
.join-logo{font-size:42px;font-weight:700;letter-spacing:-1px;margin-bottom:4px}
.join-logo b{color:var(--pk)}
.join-sub{font-size:14px;color:var(--tx2);margin-bottom:20px;letter-spacing:2px;text-transform:uppercase}
.join-box{background:var(--bg2);border:1px solid var(--bg4);border-radius:12px;padding:28px;
  width:100%;max-width:380px;display:flex;flex-direction:column;gap:16px}
.join-box label{font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.join-box input[type=text]{background:var(--bg3);border:1px solid var(--bg4);color:var(--tx);
  padding:10px 14px;border-radius:var(--r);font-size:14px;outline:none;width:100%}
.join-box input[type=text]:focus{border-color:var(--pk)}
.color-picks{display:flex;gap:8px;flex-wrap:wrap}
.color-pick{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent;
  transition:transform .12s,border-color .12s}
.color-pick:hover{transform:scale(1.15)}
.color-pick.sel{border-color:#fff;transform:scale(1.15)}
#enterBtn{padding:12px 32px;font-size:15px;font-weight:700;cursor:pointer;
  background:linear-gradient(135deg,var(--pk),var(--pu));border:none;border-radius:var(--r);
  color:#fff;text-transform:uppercase;letter-spacing:1px;margin-top:4px;width:100%}
#enterBtn:hover{transform:scale(1.03)}

/* VENUE (after join) */
#venue{display:none;position:fixed;inset:0;overflow:hidden;background:#000}
#venue.on{display:block}
#mainCanvas{position:absolute;inset:0}

/* Big Screen overlay */
#bigScreen{position:absolute;top:2%;left:25%;width:50%;height:0;padding-bottom:28%;
  background:#000;border:3px solid #222;border-radius:4px;display:none;z-index:5;
  box-shadow:0 0 30px rgba(211,84,160,.2),inset 0 0 10px rgba(0,0,0,.8)}
#bigScreen.on{display:block}
#bigScreen iframe{position:absolute;inset:0;width:100%;height:100%;border:none}

/* Chat panel */
#chatPanel{position:fixed;bottom:0;left:0;right:0;height:200px;z-index:20;
  background:rgba(10,10,15,.88);border-top:1px solid rgba(127,119,221,.2);
  display:flex;flex-direction:column}
#chatMsgs{flex:1;overflow-y:auto;padding:8px 14px;font-size:13px;line-height:1.6}
.chat-msg .chat-name{font-weight:600;margin-right:6px}
#chatInput{display:flex;border-top:1px solid var(--bg4);padding:6px 10px;gap:8px}
#chatInput input{flex:1;background:var(--bg3);border:1px solid var(--bg4);color:var(--tx);
  padding:8px 12px;border-radius:var(--r);font-size:13px;outline:none}
#chatInput input:focus{border-color:var(--pk)}
#chatInput button{padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;
  background:var(--pk);border:none;border-radius:var(--r);color:#fff}

/* HUD */
#hudTL{position:fixed;top:12px;left:14px;z-index:15;font-size:12px;color:var(--tx2);
  background:rgba(10,10,15,.6);padding:6px 12px;border-radius:var(--r)}
#hudTR{position:fixed;top:12px;right:14px;z-index:15;font-size:12px;color:var(--tx2);
  background:rgba(10,10,15,.6);padding:6px 12px;border-radius:var(--r)}
#hudBR{position:fixed;bottom:210px;right:14px;z-index:15;font-size:11px;color:var(--tx3);
  background:rgba(10,10,15,.6);padding:6px 12px;border-radius:var(--r);text-align:right;line-height:1.5}
#perfLeft{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);z-index:30;
  display:none;font-size:22px;font-weight:700;color:var(--pk);
  background:rgba(10,10,15,.8);padding:16px 32px;border-radius:12px;border:1px solid var(--pk)}
</style>
</head>
<body>

<!-- JOIN SCREEN -->
<div id="joinScreen">
  <div class="join-logo"><b>Unholy</b> Keys</div>
  <div class="join-sub">Live Venue</div>
  <div class="join-box">
    <div>
      <label>Display Name</label>
      <input type="text" id="inName" placeholder="Your name" maxlength="24" autocomplete="off">
    </div>
    <div>
      <label>Room Code</label>
      <input type="text" id="inRoom" placeholder="Enter room code" maxlength="12" autocomplete="off">
    </div>
    <div>
      <label>Avatar Color</label>
      <div class="color-picks" id="colorPicks"></div>
    </div>
    <button id="enterBtn">Enter Venue</button>
    <div id="joinErr" style="font-size:12px;color:#D85A30;display:none"></div>
  </div>
</div>

<!-- VENUE -->
<div id="venue">
  <canvas id="mainCanvas"></canvas>
  <div id="bigScreen"><iframe id="ytFrame" allow="autoplay"></iframe></div>
  <div id="hudTL">Room: <span id="hudRoom">---</span></div>
  <div id="hudTR">Viewers: <span id="hudCount">0</span></div>
  <div id="hudBR"></div>
  <div id="perfLeft">Performer has left the stage</div>
  <div id="chatPanel">
    <div id="chatMsgs"></div>
    <div id="chatInput">
      <input type="text" id="chatText" placeholder="Say something..." maxlength="200" autocomplete="off">
      <button id="chatSend">Send</button>
    </div>
  </div>
</div>

/* Build flat instrument list */
var allInst=[];
CATS.forEach(function(cat){cat.items.forEach(function(ins){ins.cat=cat.id;ins.catC=cat.c;ins.acC=cat.ac;allInst.push(ins);});});
function findInst(id){for(var i=0;i<allInst.length;i++)if(allInst[i].id===id)return allInst[i];return null;}

/* ============================================================
   AUDIO ENGINE
   ============================================================ */
var audioReady=false,started=false;
var masterVol,rev,dly,cho,dist,lim,analyser;
var samplers={},loading={};
var activeVoice=null,activeInst="piano";

function initAudio(){
  if(started)return;
  started=true;
  Tone.start();
  lim=new Tone.Limiter(-1).toDestination();
  masterVol=new Tone.Volume(-6).connect(lim);
  analyser=new Tone.Analyser("fft",256);
  masterVol.connect(analyser);
  rev=new Tone.Reverb({decay:2.5,wet:0.2}).connect(masterVol);
  dly=new Tone.FeedbackDelay({delayTime:"8n",feedback:.3,wet:0}).connect(rev);
  cho=new Tone.Chorus({frequency:1.5,delayTime:3.5,depth:.7,wet:0}).connect(dly);
  dist=new Tone.Distortion({distortion:.3,wet:0}).connect(cho);
  audioReady=true;
}

function loadSamp(id){
  if(samplers[id]||loading[id])return;
  var ins=findInst(id);
  if(!ins||ins.t!=="samp")return;
  loading[id]=true;
  var urls={};
  var ext=ins.ext||".mp3";
  Object.keys(ins.n).forEach(function(k){urls[k]=ins.n[k]+ext;});
  var folder=ins.base||id;
  var baseUrl=ins.sbase||(SBASE+folder+"/");
  var sp=new Tone.Sampler({urls:urls,baseUrl:baseUrl,release:1.2,
    onload:function(){
      delete loading[id];
      samplers[id]=sp;
      if(ins.fx){var chain=ins.fx();if(ins.gain){var gn=new Tone.Volume(ins.gain);chain.push(gn);}sp._fx=chain;sp.chain.apply(sp,chain.concat([dist]));}
      else if(ins.gain){var gn=new Tone.Volume(ins.gain);sp.connect(gn);gn.connect(dist);sp._gn=gn;}
      else{sp.connect(dist);}
    },
    onerror:function(){delete loading[id];}
  });
  setTimeout(function(){if(loading[id])delete loading[id];},15000);
}

function mkVoice(noteName,instId){
  if(!audioReady)return null;
  var ins=findInst(instId||activeInst);
  if(!ins)return null;
  if(ins.t==="samp"){
    var sp=samplers[ins.id];
    if(!sp)return null;
    return{
      atk:function(){sp.triggerAttack(noteName);},
      rel:function(){try{sp.triggerRelease(noteName);}catch(e){}},
      ar:function(dur){sp.triggerAttackRelease(noteName,dur);},
      kill:function(){},
      setEnv:function(){}
    };
  }
  var s=ins.mk();
  if(s._x&&s._x.length>0){s._x[s._x.length-1].connect(dist);}else{s.connect(dist);}
  var isPluck=(ins.id==="edm-pluck");
  return{
    atk:function(){s.triggerAttack(noteName);},
    rel:function(){try{s.triggerRelease();}catch(e){}},
    ar:function(dur){if(isPluck){s.triggerAttack(noteName);}else{s.triggerAttackRelease(noteName,dur);}},
    kill:function(){try{s.dispose();}catch(e){}},
    setEnv:function(cfg){if(s.envelope){for(var k in cfg)s.envelope[k]=cfg[k];}}
  };
}

function silenceNote(){
  if(activeVoice){
    var v=activeVoice;
    activeVoice=null;
    try{v.rel();}catch(e){}
    var ins=findInst(activeInst);
    if(!ins||ins.t!=="samp"){
      setTimeout(function(){try{v.kill();}catch(e){}},500);
    }
  }
}

function playNoteFromEvent(midi,instId,mode){
  if(!audioReady)return;
  silenceNote();
  var noteName=Tone.Frequency(midi,"midi").toNote();
  if(instId&&instId!==activeInst){
    activeInst=instId;
    var ins=findInst(instId);
    if(ins&&ins.t==="samp")loadSamp(instId);
  }
  var v=mkVoice(noteName,activeInst);
  if(!v)return;
  if(mode==="impact"){
    v.ar("32n");
  }else if(mode==="staccato"){
    v.ar("16n");
  }else{
    v.atk();
  }
  activeVoice=v;
  /* Trigger visual effects */
  isPerformerPlaying=true;
  lastNoteMidi=midi;
  lastNoteTime=Date.now();
  spawnParticles(midi);
}

  initAudio();

/* ============================================================
   CANVAS SETUP
   ============================================================ */
function initCanvas(){
  canvas=document.getElementById("mainCanvas");
  ctx=canvas.getContext("2d");
  resize();
  window.addEventListener("resize",resize);
  canvas.addEventListener("click",onCanvasClick);
}

function resize(){
  W=window.innerWidth;
  H=window.innerHeight;
  canvas.width=W;
  canvas.height=H;
}

function onCanvasClick(e){
  var rect=canvas.getBoundingClientRect();
  var cx=e.clientX-rect.left;
  var cy=e.clientY-rect.top;
  var nx=cx/W;
  var ny=cy/H;
  /* Only allow movement on the floor area */
  if(ny<FLOOR_TOP||ny>FLOOR_BOTTOM)return;
  /* Clamp x */
  nx=Math.max(0.03,Math.min(0.97,nx));
  ny=Math.max(FLOOR_TOP+0.02,Math.min(FLOOR_BOTTOM-0.02,ny));
  if(myId&&viewers[myId]){
    viewers[myId].tx=nx;
    viewers[myId].ty=ny;
    sendPos(nx,ny);
  }
}

/* ============================================================
   WEBSOCKET
   ============================================================ */
var lastPosSend=0;
function connectWS(){
  try{
    ws=new WebSocket(WS_URL);
  }catch(e){
    console.log("WS connect error",e);
    return;
  }
  ws.onopen=function(){
    wsReady=true;
    ws.send(JSON.stringify({type:"join-room",room:roomCode,name:myName,color:myColor}));
  };
  ws.onmessage=function(e){
    try{var msg=JSON.parse(e.data);}catch(x){return;}
    handleMsg(msg);
  };
  ws.onclose=function(){
    wsReady=false;
    setTimeout(function(){connectWS();},3000);
  };
  ws.onerror=function(){wsReady=false;};
}

function wsSend(obj){
  if(ws&&wsReady)ws.send(JSON.stringify(obj));
}

function sendPos(x,y){
  var now=Date.now();
  if(now-lastPosSend<100)return;
  lastPosSend=now;
  wsSend({type:"pos",x:x,y:y});
}

function handleMsg(msg){
  var t=msg.type;
  if(t==="room-state"){
    myId=msg.yourId||msg.myId;
    if(msg.viewers){
      msg.viewers.forEach(function(v){
        viewers[v.id]={name:v.name,x:v.x||0.5,y:v.y||(FLOOR_TOP+0.1),
          tx:v.x||0.5,ty:v.y||(FLOOR_TOP+0.1),color:v.color||"#7F77DD",
          bubbleText:null,bubbleTime:0};
      });
    }
    if(msg.performer){
      performer.name=msg.performer.name||"Performer";
    }
    if(msg.inst)activeInst=msg.inst;
    /* Restore performer state if joining mid-session */
    if(msg.performerState){
      var ps=msg.performerState;
      if(ps.eng){activeInst=ps.eng;perfInst=ps.eng;var si=findInst(ps.eng);if(si&&si.t==="samp")loadSamp(ps.eng);}
      if(ps.root)perfKey=ps.root;
      if(ps.scale)perfScale=ps.scale;
      if(ps.mode)perfMode=ps.mode;
    }
    /* Restore video if playing */
    if(msg.video)handleVideo(msg.video);
    updViewerCount();
    updHudBR();
  }
  else if(t==="viewer-join"){
    var jx=msg.x||0.5,jy=msg.y||(FLOOR_TOP+0.1);
    viewers[msg.id]={name:msg.name,x:jx,y:jy,
      tx:jx,ty:jy,color:msg.color||"#7F77DD",
      bubbleText:null,bubbleTime:0};
    addChat("system",msg.name+" joined the venue","#555568");
    updViewerCount();
  }
  else if(t==="viewer-leave"){
    if(viewers[msg.id]){
      addChat("system",viewers[msg.id].name+" left","#555568");
      delete viewers[msg.id];
    }
    updViewerCount();
  }
  else if(t==="pos"){
    if(viewers[msg.id]){
      viewers[msg.id].tx=msg.x;
      viewers[msg.id].ty=msg.y;
    }
  }
  else if(t==="note"){
    if(msg.on){
      playNoteFromEvent(msg.midi,msg.inst||activeInst,msg.mode||"sustain");
    }else{
      silenceNote();
      isPerformerPlaying=false;
    }
  }
  else if(t==="inst"){
    activeInst=msg.id;
    var ins=findInst(msg.id);
    if(ins&&ins.t==="samp")loadSamp(msg.id);
    updHudBR();
  }
  else if(t==="state"||t==="info"){
    if(msg.scale)perfScale=msg.scale;
    if(msg.root)perfKey=msg.root;
    if(msg.key)perfKey=msg.key;
    if(msg.mode)perfMode=msg.mode;
    if(msg.eng){activeInst=msg.eng;perfInst=msg.eng;var si=findInst(msg.eng);if(si&&si.t==="samp")loadSamp(msg.eng);}
    if(msg.inst){activeInst=msg.inst;perfInst=msg.inst;}
    updHudBR();
  }
  else if(t==="video"){
    handleVideo(msg);
  }
  else if(t==="chat"){
    var sender=msg.name||"Unknown";
    var sColor=msg.color||"#888";
    addChat(sender,msg.text,sColor);
    /* speech bubble */
    if(msg.viewerId&&viewers[msg.viewerId]){
      viewers[msg.viewerId].bubbleText=msg.text;
      viewers[msg.viewerId].bubbleTime=Date.now();
    }
  }
  else if(t==="performer-left"){
    document.getElementById("perfLeft").style.display="block";
    setTimeout(function(){document.getElementById("perfLeft").style.display="none";},5000);
    silenceNote();
    isPerformerPlaying=false;
  }
}

/* ============================================================
   CHAT
   ============================================================ */
function addChat(name,text,color){
  chatMessages.push({name:name,text:text,color:color,time:Date.now()});
  if(chatMessages.length>200)chatMessages.shift();
  renderChat();
}

function renderChat(){
  var el=document.getElementById("chatMsgs");
  var html="";
  var start=Math.max(0,chatMessages.length-80);
  for(var i=start;i<chatMessages.length;i++){
    var m=chatMessages[i];
    html+='<div class="chat-msg"><span class="chat-name" style="color:'+m.color+'">'+esc(m.name)+':</span>'+esc(m.text)+'</div>';
  }
  el.innerHTML=html;
  el.scrollTop=el.scrollHeight;
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

document.getElementById("chatSend").addEventListener("click",sendChat);
document.getElementById("chatText").addEventListener("keydown",function(e){
  if(e.key==="Enter")sendChat();
});

function sendChat(){
  var inp=document.getElementById("chatText");
  var txt=inp.value.trim();
  if(!txt)return;
  inp.value="";
  wsSend({type:"chat",text:txt});
  addChat(myName,txt,myColor);
  /* own bubble */
  if(myId&&viewers[myId]){
    viewers[myId].bubbleText=txt;
    viewers[myId].bubbleTime=Date.now();
  }
}

/* ============================================================
   VIDEO SYNC
   ============================================================ */
var ytPlayer=null,ytReady=false;
function handleVideo(msg){
  var screen=document.getElementById("bigScreen");
  var frame=document.getElementById("ytFrame");
  if(msg.action==="play"){
    screen.classList.add("on");
    var vid=msg.vid||"";
    var t=msg.time||0;
    frame.src="https://www.youtube.com/embed/"+vid+"?autoplay=1&start="+Math.floor(t)+"&enablejsapi=0";
  }else if(msg.action==="pause"){
    /* Can't easily pause an iframe without API, hide */
    frame.src="";
  }else if(msg.action==="stop"){
    screen.classList.remove("on");
    frame.src="";
  }
}

/* ============================================================
   HUD
   ============================================================ */
function updViewerCount(){
  var c=Object.keys(viewers).length;
  document.getElementById("hudCount").textContent=c;
}

function updHudBR(){
  var ins=findInst(activeInst);
  var instName=ins?ins.l:activeInst;
  var lines=[];
  lines.push("Instrument: "+instName);
  if(perfKey)lines.push("Key: "+perfKey);
  if(perfScale)lines.push("Scale: "+perfScale);
  if(perfMode)lines.push("Mode: "+perfMode);
  document.getElementById("hudBR").innerHTML=lines.join("<br>");
}

/* ============================================================
   PARTICLES
   ============================================================ */
function spawnParticles(midi){
  var oct=Math.floor(midi/12)-1;
  var hue=(midi%12)*30;
  var px=performer.x*W;
  var py=(STAGE_TOP+STAGE_BOTTOM)/2*H;
  for(var i=0;i<12;i++){
    particles.push({
      x:px,y:py,
      vx:(Math.random()-0.5)*6,
      vy:-Math.random()*4-2,
      life:1,
      decay:0.015+Math.random()*0.015,
      size:3+Math.random()*4,
      hue:hue
    });
  }
}

function updateParticles(){
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx;
    p.y+=p.vy;
    p.vy+=0.08;
    p.life-=p.decay;
    if(p.life<=0)particles.splice(i,1);
  }
}

function drawParticles(){
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    ctx.globalAlpha=p.life*0.8;
    ctx.fillStyle="hsl("+p.hue+",80%,65%)";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
}

/* ============================================================
   DRAWING: AVATAR SPRITE
   ============================================================ */
function drawAvatar(x,y,color,name,scale,isPerf,isPlaying,moving){
  var s=scale||1;
  var bw=16*s, bh=24*s;
  var cx=x, cy=y;

  /* Glow for performer when playing */
  if(isPerf&&isPlaying){
    var pulse=0.4+0.3*Math.sin(Date.now()*0.008);
    ctx.save();
    ctx.globalAlpha=pulse;
    ctx.shadowColor=color;
    ctx.shadowBlur=30*s;
    ctx.fillStyle=color;
    ctx.beginPath();
    ctx.arc(cx,cy-bh*0.3,bw*1.2,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  /* Bob when moving */
  var bob=0;
  if(moving){
    bob=Math.sin(Date.now()*0.012)*2*s;
  }

  var headR=6*s;
  var bodyW=10*s, bodyH=10*s;
  var legW=3*s, legH=6*s;
  var armW=3*s, armH=8*s;

  /* Legs */
  var legSpread=moving?Math.sin(Date.now()*0.01)*3*s:0;
  ctx.fillStyle=darken(color,0.4);
  ctx.fillRect(cx-4*s+legSpread,cy+bodyH*0.3+bob,legW,legH);
  ctx.fillRect(cx+1*s-legSpread,cy+bodyH*0.3+bob,legW,legH);

  /* Body */
  ctx.fillStyle=color;
  ctx.fillRect(cx-bodyW/2,cy-bodyH/2+bob,bodyW,bodyH);

  /* Arms */
  var armAngle=0;
  if(isPerf&&isPlaying){
    armAngle=Math.sin(Date.now()*0.015)*0.4;
  }
  ctx.save();
  ctx.fillStyle=darken(color,0.2);
  /* Left arm */
  ctx.save();
  ctx.translate(cx-bodyW/2,cy-bodyH*0.3+bob);
  ctx.rotate(-0.2+armAngle);
  ctx.fillRect(-armW,0,armW,armH);
  ctx.restore();
  /* Right arm */
  ctx.save();
  ctx.translate(cx+bodyW/2,cy-bodyH*0.3+bob);
  ctx.rotate(0.2-armAngle);
  ctx.fillRect(0,0,armW,armH);
  ctx.restore();
  ctx.restore();

  /* Head */
  ctx.fillStyle=lighten(color,0.3);
  ctx.beginPath();
  ctx.arc(cx,cy-bodyH/2-headR+2*s+bob,headR,0,Math.PI*2);
  ctx.fill();

  /* Eyes */
  ctx.fillStyle="#000";
  ctx.fillRect(cx-3*s,cy-bodyH/2-headR+2*s+bob-1*s,2*s,2*s);
  ctx.fillRect(cx+1*s,cy-bodyH/2-headR+2*s+bob-1*s,2*s,2*s);

  /* Name label */
  ctx.font="bold "+Math.round(11*s)+"px 'Segoe UI',system-ui,sans-serif";
  ctx.textAlign="center";
  ctx.fillStyle="rgba(255,255,255,0.85)";
  ctx.fillText(name,cx,cy-bodyH/2-headR*2-2*s+bob);
}

function darken(hex,amt){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.round(r*(1-amt));g=Math.round(g*(1-amt));b=Math.round(b*(1-amt));
  return"#"+pad2(r)+pad2(g)+pad2(b);
}
function lighten(hex,amt){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,Math.round(r+(255-r)*amt));g=Math.min(255,Math.round(g+(255-g)*amt));b=Math.min(255,Math.round(b+(255-b)*amt));
  return"#"+pad2(r)+pad2(g)+pad2(b);
}
function pad2(n){var s=n.toString(16);return s.length<2?"0"+s:s;}

/* ============================================================
   DRAWING: SPEECH BUBBLES
   ============================================================ */
function drawBubble(x,y,text){
  var maxW=160;
  ctx.font="12px 'Segoe UI',system-ui,sans-serif";
  var tw=Math.min(ctx.measureText(text).width+16,maxW);
  var bh=24;
  var bx=x-tw/2,by=y-50;

  ctx.fillStyle="rgba(10,10,15,0.85)";
  ctx.strokeStyle="rgba(127,119,221,0.4)";
  ctx.lineWidth=1;
  roundRect(ctx,bx,by,tw,bh,6);
  ctx.fill();
  ctx.stroke();

  /* Triangle pointer */
  ctx.fillStyle="rgba(10,10,15,0.85)";
  ctx.beginPath();
  ctx.moveTo(x-5,by+bh);
  ctx.lineTo(x+5,by+bh);
  ctx.lineTo(x,by+bh+6);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle="#e0e0e8";
  ctx.textAlign="center";
  ctx.fillText(text.length>22?text.substring(0,22)+"...":text,x,by+16);
}

function roundRect(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y);
  c.lineTo(x+w-r,y);
  c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);
  c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);
  c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);
  c.quadraticCurveTo(x,y,x+r,y);
  c.closePath();
}

/* ============================================================
   DRAWING: STAGE & FLOOR
   ============================================================ */
function drawStage(){
  var sy=STAGE_TOP*H, sh=(STAGE_BOTTOM-STAGE_TOP)*H;

  /* Stage background gradient */
  var grad=ctx.createLinearGradient(0,sy,0,sy+sh);
  grad.addColorStop(0,"#0e0818");
  grad.addColorStop(0.5,"#1a0e28");
  grad.addColorStop(1,"#120a1c");
  ctx.fillStyle=grad;
  ctx.fillRect(0,sy,W,sh);

  /* Stage platform edge */
  var platY=sy+sh-8;
  var platGrad=ctx.createLinearGradient(0,platY,0,platY+8);
  platGrad.addColorStop(0,"#3a1a4a");
  platGrad.addColorStop(1,"#1a0a24");
  ctx.fillStyle=platGrad;
  ctx.fillRect(0,platY,W,8);

  /* Spotlight effects */
  drawSpotlight(W*0.3,sy,150,"rgba(211,84,160,0.06)");
  drawSpotlight(W*0.5,sy,200,"rgba(127,119,221,0.08)");
  drawSpotlight(W*0.7,sy,150,"rgba(211,84,160,0.06)");

  /* FFT spectrum bars behind stage */
  if(audioReady&&analyser){
    drawFFT(sy,sh);
  }

  /* Stage glow shifts with register */
  if(isPerformerPlaying){
    var elapsed=Date.now()-lastNoteTime;
    if(elapsed<2000){
      var noteHue=(lastNoteMidi%12)*30;
      var glowAlpha=Math.max(0,0.08*(1-elapsed/2000));
      ctx.fillStyle="hsla("+noteHue+",60%,50%,"+glowAlpha+")";
      ctx.fillRect(0,sy,W,sh);
    }
  }
}

function drawSpotlight(x,y,radius,color){
  var grad=ctx.createRadialGradient(x,y,0,x,y+radius*1.5,radius);
  grad.addColorStop(0,color);
  grad.addColorStop(1,"transparent");
  ctx.fillStyle=grad;
  ctx.fillRect(x-radius,y,radius*2,radius*2);
}

function drawFFT(sy,sh){
  try{
    var data=analyser.getValue();
    var barCount=64;
    var barW=W/barCount;
    for(var i=0;i<barCount;i++){
      var val=data[i*Math.floor(data.length/barCount)]||0;
      var db=Math.max(0,(val+100)/100);
      var barH=db*sh*0.6;
      if(barH<1)continue;
      var hue=200+i*2;
      ctx.fillStyle="hsla("+hue+",60%,40%,0.15)";
      ctx.fillRect(i*barW,sy+sh-barH-8,barW-1,barH);
    }
  }catch(e){}
}

function drawFloor(){
  var fy=FLOOR_TOP*H, fh=(FLOOR_BOTTOM-FLOOR_TOP)*H;

  /* Floor gradient */
  var grad=ctx.createLinearGradient(0,fy,0,fy+fh);
  grad.addColorStop(0,"#0c0c14");
  grad.addColorStop(1,"#080810");
  ctx.fillStyle=grad;
  ctx.fillRect(0,fy,W,fh);

  /* Tile pattern */
  var tileSize=40;
  ctx.strokeStyle="rgba(255,255,255,0.02)";
  ctx.lineWidth=1;
  for(var tx=0;tx<W;tx+=tileSize){
    ctx.beginPath();ctx.moveTo(tx,fy);ctx.lineTo(tx,fy+fh);ctx.stroke();
  }
  for(var ty=fy;ty<fy+fh;ty+=tileSize){
    ctx.beginPath();ctx.moveTo(0,ty);ctx.lineTo(W,ty);ctx.stroke();
  }
}

function drawBelowFloor(){
  /* Area below floor (behind chat) */
  var by=FLOOR_BOTTOM*H;
  ctx.fillStyle="#060608";
  ctx.fillRect(0,by,W,H-by);
}

/* ============================================================
   NOTE FLASH
   ============================================================ */
function drawNoteFlash(){
  if(!isPerformerPlaying)return;
  var elapsed=Date.now()-lastNoteTime;
  if(elapsed>600)return;
  var alpha=Math.max(0,1-elapsed/600);
  var noteName=ROOTS[((lastNoteMidi%12)+12)%12]+(Math.floor(lastNoteMidi/12)-1);
  var px=performer.x*W;
  var py=(STAGE_TOP+STAGE_BOTTOM)/2*H-50;
  ctx.globalAlpha=alpha;
  ctx.font="bold 28px 'Segoe UI',system-ui,sans-serif";
  ctx.textAlign="center";
  ctx.fillStyle="#fff";
  ctx.fillText(noteName,px,py);
  ctx.globalAlpha=1;
}

/* ============================================================
   MAIN RENDER LOOP
   ============================================================ */
function renderLoop(){
  ctx.clearRect(0,0,W,H);

  /* Background */
  ctx.fillStyle="#0a0a0f";
  ctx.fillRect(0,0,W,H);

  drawStage();
  drawFloor();
  drawBelowFloor();

  /* Particles (behind avatars) */
  updateParticles();
  drawParticles();

  /* Performer avatar */
  var perfPx=performer.x*W;
  var perfPy=(STAGE_TOP+STAGE_BOTTOM)/2*H+20;
  drawAvatar(perfPx,perfPy,performer.color,performer.name,3,true,isPerformerPlaying,false);

  /* Note flash near performer */
  drawNoteFlash();

  /* Audience avatars - lerp positions */
  var now=Date.now();
  var ids=Object.keys(viewers);
  for(var i=0;i<ids.length;i++){
    var v=viewers[ids[i]];
    /* Lerp */
    var dx=v.tx-v.x, dy=v.ty-v.y;
    var dist2=dx*dx+dy*dy;
    var moving=dist2>0.0001;
    v.x+=dx*0.08;
    v.y+=dy*0.08;

    var vx=v.x*W, vy=v.y*H;
    drawAvatar(vx,vy,v.color,v.name,2,false,false,moving);

    /* Speech bubble */
    if(v.bubbleText&&(now-v.bubbleTime)<4000){
      var bAlpha=Math.max(0,1-(now-v.bubbleTime)/4000);
      ctx.globalAlpha=bAlpha;
      drawBubble(vx,vy-30,v.bubbleText);
      ctx.globalAlpha=1;
    }
  }

  requestAnimationFrame(renderLoop);
}

/* ============================================================
   INIT
   ============================================================ */
updHudBR();

}catch(e){
  console.error("Venue init error:",e);
}
})();
</script>
